<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チーム再編成ツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans','Yu Gothic UI','Meiryo',system-ui,sans-serif; background: #EFF2F7; min-height: 100vh; }
.header { background: linear-gradient(135deg,#1a2e5a 0%,#2563EB 100%); color: white; padding: 18px 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.header h1 { font-size: 18px; font-weight: 800; }
.header p  { font-size: 12px; opacity: 0.75; margin-top: 4px; }
.body { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }
.upload-area { border: 2.5px dashed #93C5FD; border-radius: 16px; background: white; padding: 48px 24px; text-align: center; cursor: pointer; transition: all .2s; }
.upload-area:hover, .upload-area.drag { border-color: #2563EB; background: #EFF6FF; }
.upload-icon { font-size: 48px; margin-bottom: 12px; }
.upload-title { font-size: 16px; font-weight: 800; color: #1E293B; margin-bottom: 6px; }
.upload-sub   { font-size: 13px; color: #64748B; margin-bottom: 18px; }
.upload-btn   { padding: 10px 24px; background: #2563EB; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
.summary-card { background: white; border-radius: 12px; padding: 20px 24px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 14px; }
.summary-title { font-size: 15px; font-weight: 800; color: #1E293B; margin-bottom: 14px; border-bottom: 1px solid #E2E8F0; padding-bottom: 10px; }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(150px,1fr)); gap: 10px; margin-bottom: 14px; }
.stat-box { background: #F8FAFC; border-radius: 8px; padding: 12px 14px; }
.stat-num  { font-size: 22px; font-weight: 800; color: #1D4ED8; }
.stat-label{ font-size: 11px; color: #64748B; margin-top: 2px; }
.stat-box.orange .stat-num { color: #C2410C; }
.stat-box.green  .stat-num { color: #059669; }
.stat-box.red    .stat-num { color: #DC2626; }
.gen-wrap { text-align: center; padding: 8px 0 4px; }
.gen-btn { padding: 14px 44px; background: linear-gradient(135deg,#1D4ED8,#2563EB); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 14px rgba(29,78,216,.4); font-family: inherit; }
.gen-btn:hover { filter: brightness(1.08); }
.result-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
.success-msg { color: #059669; font-weight: 700; font-size: 13px; }
.regen-btn  { padding: 7px 14px; background: white; border: 1px solid #CBD5E1; border-radius: 7px; cursor: pointer; font-size: 13px; font-family: inherit; }
.copy-btn   { padding: 7px 16px; background: #1D4ED8; color: white; border: none; border-radius: 7px; cursor: pointer; font-size: 13px; font-family: inherit; }
.copy-btn.done { background: #059669; }
.export-btn { padding: 7px 16px; background: #059669; color: white; border: none; border-radius: 7px; cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 700; }
.back-btn   { padding: 7px 14px; background: white; border: 1px solid #CBD5E1; border-radius: 7px; cursor: pointer; font-size: 13px; font-family: inherit; }
.grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(215px,1fr)); gap: 10px; }
.card { background: white; border-radius: 10px; padding: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.card.has-osaka { border-top: 2px solid #FB923C; }
.card-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; border-bottom-width: 1px; border-bottom-style: solid; padding-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.osaka-pair-badge { font-size: 11px; background: #FFF7ED; color: #EA580C; border: 1px solid #FED7AA; border-radius: 4px; padding: 1px 6px; font-weight: 700; }
.member-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.orig-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 700; white-space: nowrap; }
.new-tag  { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #EFF6FF; color: #2563EB; border: 1px solid #BFDBFE; font-weight: 700; }
.osaka-tag{ font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #FFF7ED; color: #EA580C; border: 1px solid #FED7AA; font-weight: 700; }
.mname    { font-size: 13px; color: #1E293B; }
.err-box  { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 8px; padding: 10px 16px; color: #DC2626; font-size: 13px; margin-bottom: 12px; display: none; }
.footer   { text-align: center; padding: 20px 16px; font-size: 11px; color: #94A3B8; }
</style>
</head>
<body>
<div class="header">
  <h1>🔀 チーム再編成ツール</h1>
  <p>Excelをアップロードするだけで新チームを自動生成</p>
</div>
<div class="body">
  <div id="main"></div>
</div>
<div class="footer">入力データはブラウザ内のみで処理されます。サーバーへの送信は一切ありません。</div>
<script>
const PALETTE=["#3B82F6","#10B981","#8B5CF6","#F59E0B","#EF4444","#06B6D4","#84CC16","#F97316","#EC4899","#6366F1","#14B8A6","#A855F7","#22C55E","#EAB308","#64748B"];

let app={view:'upload',participants:[],stats:{},teamNames:[],result:null};

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function findOsakaPairs(objs,nPairs){
  for(let a=0;a<2000;a++){
    const sh=shuffle(objs);
    const pairs=[];
    for(let pi=0;pi<nPairs;pi++)pairs.push([sh[pi*2],sh[pi*2+1]]);
    const solo=objs.length%2===1?sh[nPairs*2]:null;
    let ok=true;
    for(const [x,y] of pairs){
      if(x.origTeam>=0&&x.origTeam===y.origTeam){ok=false;break;}
    }
    if(ok)return{pairs,solo};
  }
  return null;
}

function generate(){
  const participants=app.participants;
  const N=participants.length;
  const nTeams=Math.ceil(N/4);
  const base=Math.floor(N/nTeams),extra=N%nTeams;
  const sizes=Array.from({length:nTeams},(_,i)=>base+(i<extra?1:0));
  const osaka=participants.filter(m=>m.osaka);
  const nonOsaka=participants.filter(m=>!m.osaka);
  const nPairs=Math.floor(osaka.length/2);
  for(let att=0;att<5000;att++){
    let pairs=[],solo=null;
    if(nPairs>0){const res=findOsakaPairs(osaka,nPairs);if(!res)continue;pairs=res.pairs;solo=res.solo;}
    else if(osaka.length===1)solo=osaka[0];
    const buckets=Array.from({length:nTeams},()=>[]);
    let ok=true;
    for(const pair of pairs){
      const ord=shuffle([...Array(nTeams).keys()]);let placed=false;
      for(const t of ord){
        if(buckets[t].length+2<=sizes[t]&&!buckets[t].some(x=>x.osaka)&&!(pair[0].origTeam>=0&&buckets[t].some(x=>x.origTeam===pair[0].origTeam))&&!(pair[1].origTeam>=0&&buckets[t].some(x=>x.origTeam===pair[1].origTeam))){buckets[t].push(pair[0],pair[1]);placed=true;break;}
      }
      if(!placed){ok=false;break;}
    }
    if(!ok)continue;
    const pool=shuffle([...(solo?[solo]:[]),...nonOsaka]);
    for(const m of pool){
      const ord=shuffle([...Array(nTeams).keys()]);let placed=false;
      for(const t of ord){
        if(buckets[t].length<sizes[t]&&!(m.origTeam>=0&&buckets[t].some(x=>x.origTeam===m.origTeam))&&!(m.osaka&&buckets[t].some(x=>x.osaka))){buckets[t].push(m);placed=true;break;}
      }
      if(!placed){ok=false;break;}
    }
    if(ok&&buckets.every((b,i)=>b.length===sizes[i]))return buckets;
  }
  return null;
}

function parseExcel(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        const getSheet=name=>XLSX.utils.sheet_to_json(wb.Sheets[name]||wb.Sheets[wb.SheetNames.find(n=>n&&n.includes(name.slice(0,3)))]||{});
        const prevRows=getSheet('前回チーム');
        const currRows=getSheet('今回参加者');
        const teamNames=[...new Set(prevRows.map(r=>String(r['チーム名']||'').trim()).filter(Boolean))];
        const memberToTeam={};
        prevRows.forEach(r=>{
          const name=String(r['メンバー名']||'').trim();
          const team=String(r['チーム名']||'').trim();
          if(name&&team)memberToTeam[name]=teamNames.indexOf(team);
        });
        const participants=[];
        currRows.forEach(r=>{
          const name=String(r['メンバー名']||'').trim();
          if(!name)return;
          const osaka=!!(r['大阪']&&String(r['大阪']).trim());
          const origTeam=memberToTeam.hasOwnProperty(name)?memberToTeam[name]:-1;
          participants.push({n:name,origTeam,osaka});
        });
        const currNames=new Set(participants.map(p=>p.n));
        const prevNames=new Set(Object.keys(memberToTeam));
        const stats={
          total:participants.length,
          prevTeams:teamNames.length,
          newCount:[...currNames].filter(n=>!prevNames.has(n)).length,
          absentCount:[...prevNames].filter(n=>!currNames.has(n)).length,
          osakaPresent:participants.filter(p=>p.osaka).length
        };
        resolve({participants,stats,teamNames});
      }catch(err){reject(err);}
    };
    reader.onerror=reject;
    reader.readAsArrayBuffer(file);
  });
}

async function handleFile(file){
  try{
    const data=await parseExcel(file);
    app.participants=data.participants;
    app.stats=data.stats;
    app.teamNames=data.teamNames;
    app.view='loaded';app.result=null;
    render();
  }catch(e){
    alert('Excelの読み込みに失敗しました。シート名・列名をご確認ください。');
    console.error(e);
  }
}

function doGenerate(){
  const r=generate();
  if(r){app.result=r;app.view='result';render();}
  else{const el=document.getElementById('errBox');if(el){el.textContent='⚠️ 生成に失敗しました。もう一度お試しください';el.style.display='block';}}
}
function doRegenerate(){const r=generate();if(r){app.result=r;renderResult();}}
function doCopy(){
  const text=app.result.map((b,i)=>'新チーム'+(i+1)+'：'+b.map(m=>m.n+(m.osaka?'（大阪）':'')).join('、')).join('\n');
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('copyBtn');if(!btn)return;
    btn.textContent='✅ コピー済み';btn.classList.add('done');
    setTimeout(()=>{btn.textContent='📋 テキストをコピー';btn.classList.remove('done');},2000);
  });
}
function goBack(){app.view='loaded';render();}

function exportNextExcel(){
  const wb=XLSX.utils.book_new();
  const PER_ROW=5;
  const rows=[];
  for(let gs=0;gs<app.result.length;gs+=PER_ROW){
    const grp=app.result.slice(gs,gs+PER_ROW);
    const maxM=Math.max(...grp.map(t=>t.length));
    const hdr=grp.map((_,i)=>'チーム'+(gs+i+1));
    while(hdr.length<PER_ROW)hdr.push('');
    rows.push(hdr);
    for(let mi=0;mi<maxM;mi++){
      const mr=grp.map(team=>team[mi]?team[mi].n:'');
      while(mr.length<PER_ROW)mr.push('');
      rows.push(mr);
    }
    if(gs+PER_ROW<app.result.length)rows.push(['','','','','']);
  }
  const wsVis=XLSX.utils.aoa_to_sheet(rows);
  wsVis['!cols']=[{wch:20},{wch:20},{wch:20},{wch:20},{wch:20}];
  XLSX.utils.book_append_sheet(wb,wsVis,'新チーム結果');
  const prevData=[];
  app.result.forEach((bucket,ni)=>{
    bucket.forEach(m=>{prevData.push({'チーム名':'チーム'+(ni+1),'メンバー名':m.n});});
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(prevData),'前回チーム');
  const currData=app.participants.map(p=>({'メンバー名':p.n,'大阪':p.osaka?'○':''}));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(currData),'今回参加者');
  XLSX.writeFile(wb,'チーム再編成_次回用.xlsx');
}

function renderUpload(){
  document.getElementById('main').innerHTML=`
    <div class="upload-area" id="dropZone">
      <div class="upload-icon">📊</div>
      <div class="upload-title">Excelファイルをアップロード</div>
      <div class="upload-sub">「前回チーム」「今回参加者」の2シートが入ったExcelをアップロードしてください</div>
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()">ファイルを選択</button>
      <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
    </div>`;
  const dz=document.getElementById('dropZone');
  const fi=document.getElementById('fileInput');
  fi.onchange=e=>{if(e.target.files[0])handleFile(e.target.files[0]);};
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
}

function renderLoaded(){
  const s=app.stats;
  const nTeams=Math.ceil(s.total/4);
  document.getElementById('main').innerHTML=`
    <div class="summary-card">
      <div class="summary-title">📊 読み込み完了</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-num">${s.total}</div><div class="stat-label">今回の参加者数</div></div>
        <div class="stat-box"><div class="stat-num">${s.prevTeams}</div><div class="stat-label">前回チーム数</div></div>
        <div class="stat-box"><div class="stat-num">${nTeams}</div><div class="stat-label">今回の新チーム数</div></div>
        <div class="stat-box red"><div class="stat-num">${s.absentCount}</div><div class="stat-label">今回不参加</div></div>
        <div class="stat-box green"><div class="stat-num">${s.newCount}</div><div class="stat-label">新規参加者</div></div>
        <div class="stat-box orange"><div class="stat-num">${s.osakaPresent}</div><div class="stat-label">大阪メンバー</div></div>
      </div>
      <div id="errBox" class="err-box"></div>
      <div class="gen-wrap"><button class="gen-btn" onclick="doGenerate()">新チームを生成する →</button></div>
    </div>`;
}

function renderResult(){
  const N=app.participants.length,nTeams=Math.ceil(N/4);
  let h=`<div class="result-bar">
    <span class="success-msg">✅ ${N}名を${nTeams}チームに配置完了！</span>
    <div style="display:flex;gap:8px">
      <button class="back-btn" onclick="goBack()">← 戻る</button>
      <button class="regen-btn" onclick="doRegenerate()">🎲 別パターン</button>
      <button class="copy-btn" id="copyBtn" onclick="doCopy()">📋 テキストをコピー</button>
      <button class="export-btn" onclick="exportNextExcel()">📥 次回用Excelを出力</button>
    </div>
  </div><div class="grid">`;
  app.result.forEach((bucket,ni)=>{
    const col=PALETTE[ni%PALETTE.length];
    const oc=bucket.filter(m=>m.osaka).length;
    h+=`<div class="card${oc>0?' has-osaka':''}" style="border-left:4px solid ${col}">`;
    h+=`<div class="card-title" style="color:${col};border-bottom-color:${col}20">新チーム ${ni+1}`
      +(oc===2?` <span class="osaka-pair-badge">🏙️ペア</span>`:oc===1?` <span class="osaka-pair-badge">🏙️ソロ</span>`:'')+`</div>`;
    bucket.forEach(m=>{
      const isNew=m.origTeam<0;
      const tc=isNew?'#2563EB':PALETTE[m.origTeam%PALETTE.length];
      h+=`<div class="member-row">`;
      h+=isNew?`<span class="new-tag">新規</span>`:`<span class="orig-tag" style="background:${tc}18;color:${tc};border:1px solid ${tc}45">旧${m.origTeam+1}</span>`;
      if(m.osaka)h+=`<span class="osaka-tag">大阪</span>`;
      h+=`<span class="mname">${esc(m.n)}</span></div>`;
    });
    h+=`</div>`;
  });
  document.getElementById('main').innerHTML=h+`</div>`;
}

function render(){
  if(app.view==='upload')renderUpload();
  else if(app.view==='loaded')renderLoaded();
  else if(app.view==='result')renderResult();
}
render();
</script>
</body>
</html>
